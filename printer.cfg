# This file contains common pin mappings for the BigTreeTech SKR 2.
# To use this config, the firmware should be compiled for the
# STM32F407 with a "32KiB bootloader".

# In newer versions of this board shipped in late 2021 the STM32F429
# is used, if this is the case compile for this with a "32KiB bootloader"
# You will need to check the chip on your board to identify which you have.
#
# The "make flash" command does not work on the SKR 2. Instead,
# after running "make", copy the generated "out/klipper.bin" file to a
# file named "firmware.bin" on an SD card and then restart the SKR 2
# with that SD card.

# See docs/Config_Reference.md for a description of parameters.

# Note: The initial revision of this board has a flaw that can cause
# damage to itself and other boards. Be sure to verify the board is
# not impacted by this flaw before using it.

[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32f407xx_250021000250315637383220-if00

restart_method: command

[input_shaper]
shaper_freq_x: 32.2
shaper_freq_y: 38.6
shaper_type: mzv

[stepper_x]
step_pin: PE2
dir_pin: PE1
enable_pin: !PE3
rotation_distance: 40
full_steps_per_rotation: 200
microsteps: 32
endstop_pin: PC1
position_endstop: 222
position_min: 0
position_max: 222
homing_speed: 90
#homing_positive_dir: true

[tmc2209 stepper_x]
uart_pin: PE0
interpolate: false
run_current: 0.5
sense_resistor: 0.110
stealthchop_threshold: 0

[stepper_z]
step_pin: PA15
dir_pin: PA8
enable_pin: !PD1
rotation_distance: 40
full_steps_per_rotation: 200
microsteps: 32
endstop_pin: PC0
position_max: 230
#homing_positive_dir: false
#position_endstop: 0
homing_speed: 15
position_min: -5.0
second_homing_speed: 3
homing_retract_dist: 3

[tmc2209 stepper_z]
uart_pin: PD0
interpolate: false
run_current: 0.5
sense_resistor: 0.110
stealthchop_threshold: 0

[stepper_y]
step_pin: PD5
dir_pin: PD4
enable_pin: !PD6
rotation_distance: 40
full_steps_per_rotation: 200
microsteps: 32
endstop_pin: !PC3
position_endstop: 0
position_min: 0
position_max: 238
homing_speed: 90
homing_positive_dir: false

[tmc2209 stepper_y]
uart_pin: PD3
interpolate: false
run_current: 0.6
sense_resistor: 0.110
stealthchop_threshold: 0

[extruder]
step_pin: PD15
dir_pin: !PD14
enable_pin: !PC7
#gear_ratio: 44:10, 37:17
microsteps: 16
full_steps_per_rotation: 200 #200 for 1.8 degree, 400 for 0.9 degree
rotation_distance: 5.5335 #5.85 #5.75
#microsteps: 16
#rotation_distance: 14.5
#gear_ratio: 50:17
nozzle_diameter: 0.400
filament_diameter: 1.750
full_steps_per_rotation: 200
heater_pin: PB3
#sensor_type: ATC Semitec 104NT-4-R025H42G  # E3d REVO
sensor_type: ATC Semitec 104GT-2
sensor_pin: PA2
#control: pid
#pid_Kp: 22.2
#pid_Ki: 1.08
#pid_Kd: 114
min_temp: 0
max_temp: 300
pressure_advance: 0.040
pressure_advance_smooth_time: 0.040
max_extrude_cross_section: 100.0
max_extrude_only_distance: 200.0

[tmc2209 extruder]
uart_pin: PC6
interpolate: false
run_current: 0.5
hold_current: 0.4
sense_resistor: 0.110
stealthchop_threshold: 0

#[extruder1]
#step_pin: PD11
#dir_pin: PD10
#enable_pin: !PD13
#heater_pin: PB4
#sensor_pin: PA3
#...

[heater_bed]
heater_pin: PD7
sensor_type: Generic 3950
sensor_pin: PA1
#control: watermark
min_temp: 0
max_temp: 120

######
#Z Max Connector on Z(main) Board
#Inductive Probe
###############
[probe]
##      If your probe is NO instead of NC, add change pin to !z:P1.24
##  This probe is not used for Z height, only Mesh
pin: PA0
x_offset: 0
y_offset: 25.0
z_offset: 1 #.1 #5.9
speed: 20
samples: 1
samples_result: median
sample_retract_dist: 2.0
samples_tolerance: 0.02
samples_tolerance_retries: 10

[fan]
pin: PB6
kick_start_time: 0.5
off_below: 0.10

##  Hotend Fan - FAN1
[heater_fan hotend_fan]
pin: PB7
max_power: 0.50
shutdown_speed: 0.0
kick_start_time: 0.6
heater: extruder
heater_temp: 50.0

[controller_fan controller_fan]
pin: PB5
shutdown_speed: 0
kick_start_time: 0.6
max_power: 1
fan_speed: 0.90
idle_speed: 0.25
idle_timeout: 30
heater: heater_bed, extruder
fan_speed: 0.75

[temperature_sensor chamber_temp]
## Chamber Temperature - T1
sensor_type: Generic 3950
sensor_pin: PA3
min_temp: 0
max_temp: 100
gcode_id: chamber_th

[temperature_sensor raspberry_pi]
sensor_type: temperature_host
min_temp: 0
max_temp: 100

#[temperature_sensor mcu_temp]
#sensor_type: temperature_mcu
#min_temp: 0
#max_temp: 100


#[heater_fan fan1]
#pin: PB6

#[heater_fan fan2]
#pin: PB5

# Due to BTT implementing a Marlin-specific safety feature,
# "anti-reversal stepper protection", this pin needs pulling
# high to pass power to stepper drivers and most FETs

[output_pin motor_power]
pin: PC13
value: 1

[printer]
kinematics: corexz
max_velocity: 300
max_accel: 5000
max_accel_to_decel: 5000
max_z_velocity: 50
max_z_accel: 1000
square_corner_velocity: 4.0


#kinematics: cartesian
#max_velocity: 300
#max_accel: 3000
#max_z_velocity: 5
#max_z_accel: 100

[idle_timeout]
timeout: 1800
gcode:
    {% if printer.pause_resume.is_paused %}
    M118 Idle Timeout reached
    M117 Disable hotend_fan
    SET_HEATER_TEMPERATURE HEATER=extruder TARGET=0
    STATUS_READY
    {% else %}
    SLEEP
    {% endif %}

#####################################################################
# 	Klipper Modules
#####################################################################

[exclude_object]

[respond]

[save_variables]
filename: ~/printer_data/variables.cfg

[servo klicky_servo]
#check were your servo is wired
#pin: PC15
pin: PE5
maximum_servo_angle: 180
minimum_pulse_width: 0.00025
maximum_pulse_width: 0.0024

[gcode_macro _servo_test_angle]
gcode:
	{% set ANGLE  = params.ANGLE|int %}
	
    SET_SERVO SERVO=klicky_servo ANGLE={ANGLE}
    G4 P250
    SET_SERVO SERVO=klicky_servo WIDTH=0.0


#####################################################################
#   Filament Sensor
#####################################################################

[filament_switch_sensor toolhead_sensor]
pause_on_runout: False
switch_pin: ^PC2
#switch_pin: ^rpi:gpio2


[filament_motion_sensor btt_smartie]
pause_on_runout: True
detection_length: 10.0
extruder: extruder
switch_pin: ^PC15
event_delay: 3.0
pause_delay: 0.5
runout_gcode:
    M117 Runout Detected!
    RESPOND TYPE=error MSG='Filament Runout Detected!'
    {action_call_remote_method("notify",
                             name="gcode_pushover",
                             message="Filament Runout Detected!")}
    TEMPS

[delayed_gcode DISABLEFILAMENTSENSOR] ; This will disable the SFS 1 second after klipper starts
initial_duration: 1
gcode:
    SET_FILAMENT_SENSOR SENSOR=btt_smartie ENABLE=1
    RESPOND MSG='Disable SFS'
    SET_FILAMENT_SENSOR SENSOR=btt_smartie ENABLE=0 ; Put your filament sensor's name after SENSOR=

[gcode_macro SFS_ENABLE] ; Add this to PRINT_START
description: Enable smart filament sensor
gcode:
    M117 ENABLING the Smart Filament Sensor
    G92 E0
    RESPOND MSG='Enable SFS'
    SET_FILAMENT_SENSOR SENSOR=btt_smartie ENABLE=1 ; Put your filament sensor's name after SENSOR=

[gcode_macro SFS_DISABLE] ; Add this to PRINT_END and PRINT_CANCEL
description: Disable smart filament sensor 
gcode:
    M117 DISABLING the Smart Filament Sensor
    G92 E0
    RESPOND MSG='Disable SFS'
    SET_FILAMENT_SENSOR SENSOR=btt_smartie ENABLE=0 ; Put your filament sensor's name after SENSOR=

[gcode_macro TEMPS] #Here's where the magic starts.
  variable_e_temp: 0 #Initialize variable for extruder temp
  variable_b_temp: 0 #Initialize variable for bed temp
  gcode:
    SET_GCODE_VARIABLE MACRO=TEMPS VARIABLE=e_temp VALUE={printer.extruder.target} #This section pulls the current extruder temp and assigns the value to the variable [e_temp]
    SET_GCODE_VARIABLE MACRO=TEMPS VARIABLE=b_temp VALUE={printer.heater_bed.target} #This section pulls the current bed temp and assigns the value to the variable [b_temp]

[gcode_macro RESUME_MACRO] #I call this macro in Octoprint in the "Before print job is resumed" section of the GCODE Scripts settings
gcode:
  M190 S{printer["gcode_macro TEMPS"].b_temp} #This entry executes an M190 command with the temperature parameter set to call back to the stored b_temp value
  M109 S{printer["gcode_macro TEMPS"].e_temp} #This entry executes an M190 command with the temperature parameter set to call back to the stored e_temp value


########################################
# EXP1 / EXP2 (display) pins
########################################

[board_pins]
aliases:
    # EXP1 header
    EXP1_1=PC5, EXP1_3=PB1, EXP1_5=PE10, EXP1_7=PE12, EXP1_9=<GND>,
    EXP1_2=PB0, EXP1_4=PE9, EXP1_6=PE11, EXP1_8=PE13, EXP1_10=<5V>,
    # EXP2 header
    EXP2_1=PA6, EXP2_3=PE7, EXP2_5=PB2, EXP2_7=PC4,   EXP2_9=<GND>,
    EXP2_2=PA5, EXP2_4=PA4, EXP2_6=PA7, EXP2_8=<RST>, EXP2_10=<NC>

