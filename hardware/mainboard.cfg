
[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32f407xx_250021000250315637383220-if00
restart_method: command

[gcode_arcs]
resolution: 0.05

[stepper_x]
step_pin: PE2
dir_pin: PE1
enable_pin: !PE3
rotation_distance: 40
full_steps_per_rotation: 200
microsteps: 16
endstop_pin: EBBCan:PB6
position_endstop: 222
position_min: 0
position_max: 222
homing_speed: 90

[tmc2209 stepper_x]
uart_pin: PE0
interpolate: false
run_current: 0.75
sense_resistor: 0.110
stealthchop_threshold: 0

[stepper_z]
step_pin: PD15
dir_pin: PD14
enable_pin: !PC7
rotation_distance: 40
full_steps_per_rotation: 200
microsteps: 16
endstop_pin: probe:z_virtual_endstop
position_max: 210
homing_speed: 10
position_min: -5.0
second_homing_speed: 3
homing_retract_dist: 3

[tmc2209 stepper_z]
uart_pin: PC6
interpolate: false
run_current: 0.75
sense_resistor: 0.110
stealthchop_threshold: 0

[stepper_y]
step_pin: PD5
dir_pin: PD4
enable_pin: !PD6
rotation_distance: 40
full_steps_per_rotation: 200
microsteps: 16
endstop_pin: !PC3
position_endstop: 0
position_min: 0
position_max: 238
homing_speed: 90
homing_positive_dir: false

[tmc2209 stepper_y]
uart_pin: PD3
interpolate: false
run_current: 0.75
sense_resistor: 0.110
stealthchop_threshold: 0

[heater_bed]
heater_pin: PD7
sensor_type: Generic 3950
sensor_pin: PA1
min_temp: 0
max_temp: 120

[controller_fan controller_fan]
pin: PB5
shutdown_speed: 0
kick_start_time: 0.6
max_power: 1
idle_speed: 0.25
idle_timeout: 30
heater: heater_bed, extruder
fan_speed: 0.75

[temperature_sensor raspberry_pi]
sensor_type: temperature_host
min_temp: 0
max_temp: 100

[temperature_sensor mcu_temp]
sensor_type: temperature_mcu
min_temp: 0
max_temp: 100

[output_pin motor_power]
pin: PC13
value: 1

[printer]
kinematics: corexz
max_velocity: 300
max_accel: 5000
max_z_velocity: 50
max_z_accel: 1000
square_corner_velocity: 4.0
