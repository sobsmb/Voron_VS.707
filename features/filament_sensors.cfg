[filament_switch_sensor switch_sensor]
switch_pin: ^PA9
pause_on_runout: False
event_delay: 5.0
pause_delay: 1.0
debounce_delay: 0.2
runout_gcode:
  PAUSE
  M117 Filament switch runout
  RESPOND TYPE=error MSG='Filament Runout Detected Switch!'
  {action_call_remote_method("notify",
                             name="gcode_pushover",
                             message="Filament Runout Detected Switch!")}
  TEMPS
insert_gcode:
  M117 Filament switch inserted

[filament_motion_sensor btt_smartie]
switch_pin: ^PA10
detection_length: 5.0
extruder: extruder
pause_on_runout: False
event_delay: 5.0
pause_delay: 1.0
runout_gcode:
  PAUSE
  M117 Filament encoder runout
  RESPOND TYPE=error MSG='Filament Runout Detected Smartie!'
  {action_call_remote_method("notify",
                             name="gcode_pushover",
                             message="Filament Runout Detected Smartie!")}
  TEMPS
insert_gcode:
  M117 Filament encoder inserted