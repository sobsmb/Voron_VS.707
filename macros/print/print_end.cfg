
[gcode_macro PRINT_END]
description: End print and tidy up
gcode:
    SFS_DISABLE
    STATUS_BUSY
    M400
    G92 E0
    G1 E-10.0 F3600
    G91

    {% set max_x = printer.configfile.config["stepper_x"]["position_max"]|float %}
    {% set max_y = printer.configfile.config["stepper_y"]["position_max"]|float %}
    {% set max_z = printer.configfile.config["stepper_z"]["position_max"]|float %}
    {% set x_park = max_x %}
    {% set y_park = max_y %}

    TURN_OFF_HEATERS
    M107

    {% if printer.toolhead.position.z < (max_z - 15) %}
      G1 Z15 F10000
    {% endif %}

    G90
    G1 X{x_park} Y{y_park} F6000
    M117 Print Complete.

    {% if printer.configfile.config["bed_mesh"] %}
      BED_MESH_CLEAR
    {% endif %}

    CLEAR_PAUSE
    STATUS_READY
    UPDATE_DELAYED_GCODE ID=_CLEAR_DISPLAY DURATION=60
    UPDATE_DELAYED_GCODE ID=_SAVE_CONFIG DURATION=90
