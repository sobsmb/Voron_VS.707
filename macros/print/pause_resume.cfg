
[gcode_macro TEMPS]
variable_e_temp: 0
variable_b_temp: 0
gcode:
  SET_GCODE_VARIABLE MACRO=TEMPS VARIABLE=e_temp VALUE={printer.extruder.target}
  SET_GCODE_VARIABLE MACRO=TEMPS VARIABLE=b_temp VALUE={printer.heater_bed.target}

[gcode_macro RESUME_MACRO]
gcode:
  M190 S{printer["gcode_macro TEMPS"].b_temp}
  M109 S{printer["gcode_macro TEMPS"].e_temp}

[gcode_macro PAUSE]
rename_existing: BASE_PAUSE
variable_extrude: 2.0
description: Pause the print and park the toolhead at the front
gcode:
  UPDATE_DELAYED_GCODE ID=_SFS_REENABLE_AFTER_RESUME DURATION=0
  SFS_DISABLE
  STATUS_PAUSED
  {% set E = printer["gcode_macro PAUSE"].extrude|float %}
  {% set x_park = printer.configfile.config["stepper_x"]["position_max"]|float %}
  {% set y_park = 0|float %}
  {% set max_z = printer.toolhead.axis_maximum.z|float %}
  {% set act_z = printer.toolhead.position.z|float %}
  {% if act_z < (max_z - 10.0) %}
      {% set z_safe = act_z + 10.0 %}
  {% else %}
      {% set z_safe = max_z %}
  {% endif %}
  M118 Parking at X:{x_park} Y:{y_park} Z:{z_safe}
  SAVE_GCODE_STATE NAME=PAUSE_state
  BASE_PAUSE
  G91
  G1 E-{E} F2100
  G90
  G1 Z{z_safe} F900
  G1 X{x_park} Y{y_park} F6000
  UPDATE_DELAYED_GCODE ID=_CLEAR_DISPLAY DURATION=10
  {action_call_remote_method("notify", name="gcode_pushover", message="Printer Paused!")}

[gcode_macro RESUME]
rename_existing: BASE_RESUME
description: Resume a paused print
gcode:
  {% set E = printer["gcode_macro PAUSE"].extrude|float %}
  RESUME_MACRO
  G91
  G1 E{E} F2100
  RESTORE_GCODE_STATE NAME=PAUSE_state
  UPDATE_DELAYED_GCODE ID=_CLEAR_DISPLAY DURATION=10
  STATUS_PRINTING
  BASE_RESUME
  UPDATE_DELAYED_GCODE ID=_SFS_REENABLE_AFTER_RESUME DURATION=30
