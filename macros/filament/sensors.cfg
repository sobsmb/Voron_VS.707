
[delayed_gcode DISABLEFILAMENTSENSOR]
initial_duration: 1
gcode:
    SET_FILAMENT_SENSOR SENSOR=btt_smartie ENABLE=1
    RESPOND MSG='Disable SFS'
    SET_FILAMENT_SENSOR SENSOR=btt_smartie ENABLE=0

[delayed_gcode _SFS_ENABLE]
gcode:
    SFS_ENABLE

[gcode_macro SFS_ENABLE]
description: Enable smart filament sensor
gcode:
    M117 ENABLING the Smart Filament Sensor
    G92 E0
    RESPOND MSG='Enable SFS'
    SET_FILAMENT_SENSOR SENSOR=btt_smartie ENABLE=1

[gcode_macro SFS_DISABLE]
description: Disable smart filament sensor
gcode:
    M117 DISABLING the Smart Filament Sensor
    G92 E0
    RESPOND MSG='Disable SFS'
    SET_FILAMENT_SENSOR SENSOR=btt_smartie ENABLE=0

[delayed_gcode _SFS_REENABLE_AFTER_RESUME]
gcode:
  SFS_ENABLE